version: "3.9"

services:
  # Drop the host :3000 binding — nginx is the only entry point in HTTPS mode.
  app:
    ports: []
    environment:
      # Tell webpack-dev-server's HMR client to use the page's port (443) instead of 3000,
      # so wss://mailsync.com/ws routes through nginx.
      WDS_SOCKET_PORT: 0

  nginx:
    image: nginx:alpine
    container_name: mail-sync-nginx-container
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
      - api
    networks:
      - bridge_network
