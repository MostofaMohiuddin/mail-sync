<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Primary -->
    <title>MailSync — One inbox, every account</title>
    <meta
      name="description"
      content="MailSync unifies every Gmail account, schedules mail, sets vacation auto-replies, and surfaces what matters — one calm workspace, with AI that helps when you want it."
    />
    <meta name="application-name" content="MailSync" />
    <meta name="theme-color" content="#6366F1" />
    <meta name="color-scheme" content="dark light" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Canonical -->
    <link rel="canonical" href="https://mailsync.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MailSync" />
    <meta property="og:title" content="MailSync — One inbox, every account" />
    <meta
      property="og:description"
      content="Unify every Gmail account, schedule mail, set vacation auto-replies, and surface what matters — one calm workspace with AI on tap."
    />
    <meta property="og:url" content="https://mailsync.com/" />
    <meta property="og:image" content="https://mailsync.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="MailSync — your mail and calendar in one beautiful inbox" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MailSync — One inbox, every account" />
    <meta
      name="twitter:description"
      content="Unify every Gmail account, schedule mail, set vacation auto-replies, and surface what matters — one calm workspace with AI on tap."
    />
    <meta name="twitter:image" content="https://mailsync.com/og-image.jpg" />
    <meta name="twitter:image:alt" content="MailSync — your mail and calendar in one beautiful inbox" />

    <!-- Robots -->
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!-- Third-party styles -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/draft-js-static-toolbar-plugin@3.0.1/lib/plugin.min.css"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
